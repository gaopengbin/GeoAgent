services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      CESIUM_TOKEN: ${CESIUM_TOKEN:-}
      TIANDITU_TOKEN: ${TIANDITU_TOKEN:-}
    volumes:
      - ./backend:/app
      - geoagent_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  geoagent_data:
